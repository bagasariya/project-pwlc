<!DOCTYPE html>
<html>
<head>
  <title>Proyek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .sidebar {
      width: 250px;
      height: 100vh;
      background: linear-gradient(180deg, #0d6efd, #0b5ed7);
      color: white;
    }
  </style>
  <link href="/css/sidebar.css" rel="stylesheet">
</head>

<body>

<script src="/js/app.js"></script>
<script src="/component/sidebar.js"></script>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <!-- CONTENT -->
  <div class="flex-grow-1 p-4">

    <h3>Data Proyek</h3>

    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalTambah">
      + Tambah Proyek
    </button>

    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>Nama</th>
          <th>Lokasi</th>
          <th>Mulai</th>
          <th>Deadline</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tabelProyek"></tbody>
    </table>

  </div>

</div>

<!-- MODAL TAMBAH -->
<div class="modal fade" id="modalTambah">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Tambah Proyek</h5></div>
      <div class="modal-body">
        <input type="text" id="nama" class="form-control mb-2" placeholder="Nama Proyek">
        <input type="text" id="lokasi" class="form-control mb-2" placeholder="Lokasi">
        <input type="date" id="mulai" class="form-control mb-2">
        <input type="date" id="deadline" class="form-control">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="tambah()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL EDIT -->
<div class="modal fade" id="modalEdit">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Edit Proyek</h5></div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <input type="text" id="editNama" class="form-control mb-2">
        <input type="text" id="editLokasi" class="form-control mb-2">
        <input type="date" id="editMulai" class="form-control mb-2">
        <input type="date" id="editDeadline" class="form-control">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="update()">Update</button>
      </div>
    </div>
  </div>
</div>

<script>

// LOAD DATA
async function loadData() {
  const res = await fetch("/api/proyek");
  const data = await res.json();

  let html = "";

  data.forEach(p => {
    html += `
      <tr>
        <td>${p.nama}</td>
        <td>${p.lokasi}</td>
        <td>${p.tanggal_mulai}</td>
        <td>${p.deadline}</td>
        <td>
          <button class="btn btn-warning btn-sm" onclick="openEdit(${p.id}, '${p.nama}', '${p.lokasi}', '${p.tanggal_mulai}', '${p.deadline}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="hapus(${p.id})">Hapus</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("tabelProyek").innerHTML = html;
}

// TAMBAH
async function tambah() {
  const nama = document.getElementById("nama").value;
  const lokasi = document.getElementById("lokasi").value;
  const tanggal_mulai = document.getElementById("mulai").value;
  const deadline = document.getElementById("deadline").value;

  await fetch("/api/proyek", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ nama, lokasi, tanggal_mulai, deadline })
  });

  loadData();
}

// HAPUS
async function hapus(id) {
  await fetch("/api/proyek", {
    method: "DELETE",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  loadData();
}

// EDIT
function openEdit(id, nama, lokasi, mulai, deadline) {
  document.getElementById("editId").value = id;
  document.getElementById("editNama").value = nama;
  document.getElementById("editLokasi").value = lokasi;
  document.getElementById("editMulai").value = mulai;
  document.getElementById("editDeadline").value = deadline;

  new bootstrap.Modal(document.getElementById("modalEdit")).show();
}

// UPDATE
async function update() {
  const id = document.getElementById("editId").value;
  const nama = document.getElementById("editNama").value;
  const lokasi = document.getElementById("editLokasi").value;
  const tanggal_mulai = document.getElementById("editMulai").value;
  const deadline = document.getElementById("editDeadline").value;

  await fetch("/api/proyek", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id, nama, lokasi, tanggal_mulai, deadline })
  });

  loadData();
}

// INIT
loadData();

</script>

<!-- SIDEBAR COMPONENT -->
<script src="/components/sidebar.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

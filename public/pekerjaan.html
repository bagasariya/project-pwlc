<!DOCTYPE html>
<html>
<head>
  <title>Pekerjaan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/sidebar.css" rel="stylesheet">
</head>

<body>
<script src="/js/app.js"></script>
<script src="/component/sidebar.js"></script>


<div class="d-flex">

  <!-- SIDEBAR -->
  <div id="sidebar" style="width:250px;">
    
  </div>

  <!-- CONTENT -->
  <div class="flex-grow-1 p-4">

    <h3>Data Pekerjaan</h3>

    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalTambah">
      + Tambah Pekerjaan
    </button>

    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Nama Pekerjaan</th>
          <th>Area</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tabelPekerjaan"></tbody>
    </table>

  </div>

</div>

<!-- MODAL TAMBAH -->
<div class="modal fade" id="modalTambah">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Tambah Pekerjaan</h5></div>
      <div class="modal-body">
        <input type="text" id="nama" class="form-control mb-2" placeholder="Nama Pekerjaan">
        <select id="area" class="form-control"></select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="tambah()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL EDIT -->
<div class="modal fade" id="modalEdit">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Edit Pekerjaan</h5></div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <input type="text" id="editNama" class="form-control mb-2">
        <select id="editArea" class="form-control"></select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="update()">Update</button>
      </div>
    </div>
  </div>
</div>

<script>

// LOAD AREA
async function loadArea() {
  const res = await fetch("/api/area");
  const data = await res.json();

  let html = "";
  data.forEach(a => {
    html += `<option value="${a.id}">${a.nama}</option>`;
  });

  document.getElementById("area").innerHTML = html;
  document.getElementById("editArea").innerHTML = html;
}

// LOAD DATA
async function loadData() {
  const res = await fetch("/api/pekerjaan");
  const data = await res.json();

  let html = "";

  data.forEach(p => {
    html += `
      <tr>
        <td>${p.nama}</td>
        <td>${p.area?.nama || '-'}</td>
        <td>
          <button class="btn btn-warning btn-sm" onclick="openEdit(${p.id}, '${p.nama}', ${p.area_id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="hapus(${p.id})">Hapus</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("tabelPekerjaan").innerHTML = html;
}

// TAMBAH
async function tambah() {
  const nama = document.getElementById("nama").value;
  const area_id = document.getElementById("area").value;

  await fetch("/api/pekerjaan", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nama, area_id })
  });

  loadData();
}

// HAPUS
async function hapus(id) {
  await fetch("/api/pekerjaan", {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id })
  });

  loadData();
}

// EDIT
function openEdit(id, nama, area_id) {
  document.getElementById("editId").value = id;
  document.getElementById("editNama").value = nama;
  document.getElementById("editArea").value = area_id;

  new bootstrap.Modal(document.getElementById("modalEdit")).show();
}

// UPDATE
async function update() {
  const id = document.getElementById("editId").value;
  const nama = document.getElementById("editNama").value;
  const area_id = document.getElementById("editArea").value;

  await fetch("/api/pekerjaan", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id, nama, area_id })
  });

  loadData();
}


// INIT
loadArea();
loadData();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

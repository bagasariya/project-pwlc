<!DOCTYPE html>
<html>
<head>
  <title>Area</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/sidebar.css" rel="stylesheet">
</head>

<body>

<!-- PROTEKSI LOGIN -->
<script src="/js/app.js"></script>
<script src="/component/sidebar.js"></script>

<div class="d-flex">

  <div id="sidebar"></div>


  <!-- CONTENT -->
  <div class="flex-grow-1 p-4">

    <h3>Data Area</h3>

    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalTambah">
      + Tambah Area
    </button>

    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>Nama Area</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tabelArea"></tbody>
    </table>

  </div>

</div>

<!-- MODAL TAMBAH -->
<div class="modal fade" id="modalTambah">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Tambah Area</h5></div>
      <div class="modal-body">
        <input type="text" id="nama" class="form-control" placeholder="Nama Area">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="tambahArea()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL EDIT -->
<div class="modal fade" id="modalEdit">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Edit Area</h5></div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <input type="text" id="editNama" class="form-control">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="updateArea()">Update</button>
      </div>
    </div>
  </div>
</div>

<script>

// LOAD DATA
async function loadData() {
  const res = await fetch("/api/area");
  const data = await res.json();

  let html = "";

  data.forEach(a => {
    html += `
      <tr>
        <td>${a.nama}</td>
        <td>
          <button class="btn btn-warning btn-sm" onclick="openEdit(${a.id}, '${a.nama}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="hapus(${a.id})">Hapus</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("tabelArea").innerHTML = html;
}

// TAMBAH
async function tambahArea() {
  const nama = document.getElementById("nama").value;

  await fetch("/api/area", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ nama })
  });

  document.getElementById("nama").value = "";
  loadData();
}

// HAPUS
async function hapus(id) {
  await fetch("/api/area", {
    method: "DELETE",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  loadData();
}

// OPEN EDIT
function openEdit(id, nama) {
  document.getElementById("editId").value = id;
  document.getElementById("editNama").value = nama;

  new bootstrap.Modal(document.getElementById("modalEdit")).show();
}

// UPDATE
async function updateArea() {
  const id = document.getElementById("editId").value;
  const nama = document.getElementById("editNama").value;

  await fetch("/api/area", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id, nama })
  });

  loadData();

  const modal = bootstrap.Modal.getInstance(document.getElementById("modalEdit"));
  modal.hide();
}

// LOGOUT

// LOAD AWAL
loadData();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

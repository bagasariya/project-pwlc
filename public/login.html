<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      background: url("https://images.unsplash.com/photo-1503387762-592deb58ef4e") no-repeat center center;
      background-size: cover;
    }

    .overlay {
      background: rgba(0,0,0,0.5);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      width: 350px;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: white;
    }

    .form-control {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
    }

    .form-control::placeholder {
      color: #ddd;
    }

    .btn-login {
      width: 100%;
    }
  </style>
</head>

<body>

<div class="overlay">

  <div class="login-card shadow-lg">

    <h3 class="text-center mb-4">Login</h3>

    <form id="loginForm">
      <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>
      <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

      <button type="submit" class="btn btn-primary btn-login">
        Login
      </button>
    </form>

    <p id="result" class="mt-3 text-center"></p>

  </div>

</div>

<script>
const form = document.getElementById("loginForm");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user", username);
    window.location.href = "/dashboard.html";
  } else {
    document.getElementById("result").innerText = "Login gagal!";
  }
});
</script>

</body>
</html>

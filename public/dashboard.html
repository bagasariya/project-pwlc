<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<script src="/js/app.js"></script>
<script src="/js/layout.js"></script>

<div class="d-flex">

  <!-- Sidebar -->
  <div class="bg-dark text-white p-3 vh-100" style="width: 250px;" id="sidebar">
    
  </div>

  <!-- Content -->
  <div class="flex-grow-1 p-4">

    <!-- Navbar -->
    <nav class="navbar bg-light mb-4">
      <span class="navbar-brand">Dashboard</span>
    </nav>

    <!-- Cards -->
    <div class="row">
      <div class="col-md-4">
        <div class="card p-3">Total Karyawan: 25</div>
      </div>
      <div class="col-md-4">
        <div class="card p-3">Total Area: 5</div>
      </div>
      <div class="col-md-4">
        <div class="card p-3">Total Pekerjaan: 12</div>
      </div>
    </div>

  </div>

</div>

</body>
</html>

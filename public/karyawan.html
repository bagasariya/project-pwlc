<!DOCTYPE html>
<html>
<head>
  <title>Karyawan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/sidebar.css" rel="stylesheet">
</head>

<body>
<script src="/js/app.js"></script>
<script src="/component/sidebar.js"></script>

<!-- PROTEKSI LOGIN -->

<div class="d-flex">

  <!-- SIDEBAR -->
  <div style="width: 250px;" id="sidebar">
    
  </div>

  <!-- CONTENT -->
  <div class="flex-grow-1 p-4">

    <h3>Data Karyawan</h3>

    <!-- BUTTON -->
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalTambah">
      + Tambah Karyawan
    </button>

    <!-- TABLE -->
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
            <th>ID</th>
          <th>Nama</th>
          <th>Jabatan</th>
            <th>Area</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tabelKaryawan"></tbody>
    </table>

  </div>

</div>

<!-- MODAL TAMBAH -->
<div class="modal fade" id="modalTambah">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Tambah Karyawan</h5>
      </div>
      <div class="modal-body">
        <!-- <input type="text" id="id" class="form-control mb-2" placeholder="ID"> -->
        <input type="text" id="nama" class="form-control mb-2" placeholder="Nama">
        <input type="text" id="jabatan" class="form-control mb-2" placeholder="Jabatan">
        <select id="area" class="form-control">
        <option value="">Pilih Area</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="tambahKaryawan()">Simpan</button>
      </div>
    </div>
  </div>
</div>
<!-- MODAL EDIT -->
<div class="modal fade" id="modalEdit">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Edit Karyawan</h5>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <input type="text" id="editNama" class="form-control mb-2">
        <input type="text" id="editJabatan" class="form-control">
        <select id="editArea" class="form-control mt-2"></select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="updateKaryawan()">Update</button>
      </div>
    </div>
  </div>
</div>
<!-- SCRIPT -->
<script>

// 🔄 LOAD DATA DARI API
async function loadData() {
  const res = await fetch("/api/karyawan");
  const data = await res.json();

  let html = "";

  data.forEach((k) => {
    html += `
      <tr>
        <td>${k.id}</td>
        <td>${k.nama}</td>
        <td>${k.jabatan}</td>
        <td>${k.area?.nama || '-'}</td>

        <td>
            <button class="btn btn-warning btn-sm" onclick="openEdit(${k.id}, '${k.nama}', '${k.jabatan}', ${k.area_id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="hapus(${k.id})">Hapus</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("tabelKaryawan").innerHTML = html;
}

// ➕ TAMBAH DATA
async function tambahKaryawan() {
  const nama = document.getElementById("nama").value;
  const jabatan = document.getElementById("jabatan").value;
    const area_id = document.getElementById("area").value;
  
    await fetch("/api/karyawan", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ nama, jabatan, area_id })
  });

  // reset input
  document.getElementById("nama").value = "";
  document.getElementById("jabatan").value = "";

  loadData();
}

// ❌ HAPUS DATA
async function hapus(id) {
  await fetch("/api/karyawan", {
    method: "DELETE",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  loadData();
}

async function updateKaryawan() {
  const id = document.getElementById("editId").value;
  const nama = document.getElementById("editNama").value;
  const jabatan = document.getElementById("editJabatan").value;
    const area_id = document.getElementById("editArea").value;
  await fetch("/api/karyawan", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id, nama, jabatan, area_id })
  });

  loadData();

  // tutup modal
  const modalEl = document.getElementById("modalEdit");
  const modal = bootstrap.Modal.getInstance(modalEl);
  modal.hide();
}

function openEdit(id, nama, jabatan, area_id) {
  document.getElementById("editId").value = id;
  document.getElementById("editNama").value = nama;
  document.getElementById("editJabatan").value = jabatan;
 document.getElementById("editArea").value = area_id;
  const modal = new bootstrap.Modal(document.getElementById("modalEdit"));
  modal.show();
}
// 🚪 LOGOUT
async function loadArea() {
  const res = await fetch("/api/area");
  const data = await res.json();

  let html = "";

  data.forEach(a => {
    html += `<option value="${a.id}">${a.nama}</option>`;
  });

  document.getElementById("area").innerHTML = html;
  document.getElementById("editArea").innerHTML = html;
}
// 🚀 LOAD AWAL
loadData();
loadArea();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

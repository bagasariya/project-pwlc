<!DOCTYPE html>
<html>
<head>
  <title>Penugasan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/sidebar.css" rel="stylesheet">
</head>

<body>

<script src="/js/app.js"></script>
<script src="/component/sidebar.js"></script>


<div class="d-flex">

  <div id="sidebar"></div>

  <div class="flex-grow-1 p-4">

    <h3>Penugasan Karyawan</h3>

    <div class="card p-3 shadow mb-3">
      <div class="row">
        <div class="col-md-4">
          <select id="karyawan" class="form-control"></select>
        </div>
        <div class="col-md-4">
          <select id="proyek" class="form-control"></select>
        </div>
        <div class="col-md-4">
          <select id="area" class="form-control"></select>
        </div>
      </div>

      <button class="btn btn-primary mt-3" onclick="tambah()">Tambah Penugasan</button>
    </div>

    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Karyawan</th>
          <th>Proyek</th>
          <th>Area</th>
        </tr>
      </thead>
      <tbody id="tabel"></tbody>
    </table>

  </div>

</div>

<script>

// LOAD DROPDOWN
async function loadDropdown() {

  const karyawan = await fetch("/api/karyawan").then(r => r.json());
  const proyek = await fetch("/api/proyek").then(r => r.json());
  const area = await fetch("/api/area").then(r => r.json());

  document.getElementById("karyawan").innerHTML =
    karyawan.map(k => `<option value="${k.id}">${k.nama}</option>`).join("");

  document.getElementById("proyek").innerHTML =
    proyek.map(p => `<option value="${p.id}">${p.nama}</option>`).join("");

  document.getElementById("area").innerHTML =
    area.map(a => `<option value="${a.id}">${a.nama}</option>`).join("");
}

// TAMBAH
async function tambah() {
  const karyawan_id = document.getElementById("karyawan").value;
  const proyek_id = document.getElementById("proyek").value;
  const area_id = document.getElementById("area").value;

  await fetch("/api/penugasan", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ karyawan_id, proyek_id, area_id })
  });

  loadData();
}

// LOAD DATA
async function loadData() {
  const res = await fetch("/api/penugasan");
  const data = await res.json();

  let html = "";

  data.forEach(p => {
    html += `
      <tr>
        <td>${p.karyawan.nama}</td>
        <td>${p.proyek.nama}</td>
        <td>${p.area.nama}</td>
      </tr>
    `;
  });

  document.getElementById("tabel").innerHTML = html;
}

// INIT
loadDropdown();
loadData();

</script>

<!-- <script src="/components/sidebar.js"></script> -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

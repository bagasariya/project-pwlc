<!DOCTYPE html>
<html>
<head>
  <title>Progress</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/sidebar.css" rel="stylesheet">
</head>

<body>

<script src="/js/app.js"></script>
<script src="/component/sidebar.js"></script>

<div class="d-flex">

  <div id="sidebar"></div>

  <div class="flex-grow-1 p-4">

    <h3>Progress Proyek</h3>

    <div class="card p-3 shadow mb-3">
      <div class="row">
        <div class="col-md-3">
          <select id="proyek" class="form-control"></select>
        </div>
        <div class="col-md-3">
          <select id="pekerjaan" class="form-control"></select>
        </div>
        <div class="col-md-2">
          <input type="number" id="persen" class="form-control" placeholder="%">
        </div>
        <div class="col-md-2">
          <input type="date" id="tanggal" class="form-control">
        </div>
      </div>

      <button class="btn btn-primary mt-3" onclick="tambah()">Tambah Progress</button>
    </div>

    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Proyek</th>
          <th>Pekerjaan</th>
          <th>Progress</th>
          <th>Tanggal</th>
        </tr>
      </thead>
      <tbody id="tabel"></tbody>
    </table>

  </div>

</div>

<script>

// LOAD DROPDOWN
async function loadDropdown() {

  const proyek = await fetch("/api/proyek").then(r => r.json());
  const pekerjaan = await fetch("/api/pekerjaan").then(r => r.json());

  document.getElementById("proyek").innerHTML =
    proyek.map(p => `<option value="${p.id}">${p.nama}</option>`).join("");

  document.getElementById("pekerjaan").innerHTML =
    pekerjaan.map(p => `<option value="${p.id}">${p.nama}</option>`).join("");
}

// TAMBAH
async function tambah() {
  const proyek_id = document.getElementById("proyek").value;
  const pekerjaan_id = document.getElementById("pekerjaan").value;
  const persen = document.getElementById("persen").value;
  const tanggal = document.getElementById("tanggal").value;

  await fetch("/api/progress", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ proyek_id, pekerjaan_id, persen, tanggal })
  });

  loadData();
}

// LOAD DATA
async function loadData() {
  const res = await fetch("/api/progress");
  const data = await res.json();

  let html = "";

  data.forEach(p => {
    html += `
      <tr>
        <td>${p.proyek.nama}</td>
        <td>${p.pekerjaan.nama}</td>
        <td>${p.persen}%</td>
        <td>${p.tanggal}</td>
      </tr>
    `;
  });

  document.getElementById("tabel").innerHTML = html;
}

// INIT
loadDropdown();
loadData();

</script>

<!-- <script src="/components/sidebar.js"></script> -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
